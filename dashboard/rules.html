<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Rule Inventory</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/rules.css">
</head>

<body data-attach-logout="false">
    <nav>
        <div class="nav-brand">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ff570a" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <span style="color: #ff570a;">MODINTEL</span>
        </div>
        <div class="nav-links">
            <a href="/events">Events</a>
            <a href="/rules" class="active">Rules</a>
            <a href="/training">Training</a>
            <a href="/datasets">Datasets</a>
            <a href="/reports">Reports</a>
            <a href="/monitor">Monitor</a>
            <a href="/settings">Settings</a>
        </div>
        <div class="nav-actions"></div>
    </nav>
    <div class="main">
        <div class="panel-left">
            <div class="hero-eyebrow">Policy</div>
            <h1>Rule Intelligence</h1>
            <p>Active security signatures currently enforced by the ModIntel engine.</p>

            <div class="rule-editor">
                <h3>Write Custom Rule</h3>
                <div class="form-group">
                    <label>Rule ID</label>
                    <input type="text" id="rule-id" placeholder="990100">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="rule-category">
                        <option value="SQLi">SQL Injection</option>
                        <option value="XSS">XSS Attack</option>
                        <option value="RCE">RCE Attack</option>
                        <option value="LFI">Path Traversal</option>
                        <option value="RFI">RFI Attack</option>
                        <option value="Protocol">Protocol</option>
                        <option value="Custom">Custom</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="rule-desc" placeholder="Brief description of the rule">
                </div>
                <div class="form-group">
                    <label>Rule Syntax</label>
                    <textarea id="rule-syntax" rows="4"
                        placeholder="SecRule ARGS &quot;@rx pattern&quot; &quot;id:990100,phase:2,pass,log,msg:'Rule description'&quot;"></textarea>
                </div>
                <div class="form-actions">
                    <button class="btn btn-primary" id="save-rule-btn" type="button">Add Rule</button>
                    <button class="btn btn-secondary" id="clear-rule-btn" type="button">Clear</button>
                </div>
            </div>
        </div>
        <div class="panel-right" style="overflow: hidden;">
            <div class="panel-right-header">
                <div
                    style="font-size: 0.75rem; text-transform: uppercase; color: var(--fg-subtle); font-weight: 600; letter-spacing: 0.05em;">
                    Security Signatures</div>
                <div class="restart-notice-wrap">
                    <div class="restart-notice">Changes require WAF restart to take effect.</div>
                    <button class="btn btn-secondary restart-btn" id="restart-waf-btn" type="button">Restart WAF</button>
                </div>
            </div>
            <div class="log-scroll">
                <table class="rules-table">
                    <thead>
                        <tr>
                            <th style="width: 15%;">Rule ID</th>
                            <th>Classification</th>
                            <th style="width: 50%;">Description</th>
                            <th style="width: 22%;">Status</th>
                        </tr>
                    </thead>
                    <tbody id="rules-tbody">
                    </tbody>
                </table>
                <div id="pagination-controls" style="display: flex; justify-content: center; align-items: center; padding: 1rem; gap: 1rem;"></div>
            </div>
        </div>
    </div>
    <script src="js/auth.js"></script>
    <script src="js/boot.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/rules.js"></script>
</body>

</html>
