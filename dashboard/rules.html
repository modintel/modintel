<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ModIntel — Rule Inventory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --bg: #ffffff;
            --fg: #121212;
            --fg-muted: #555555;
            --fg-subtle: rgba(0, 0, 0, 0.35);
            --border: rgba(0, 0, 0, 0.06);
            --border-active: rgba(0, 0, 0, 0.6);
            --accent: #ff570a;
            --accent-fg: #ffffff;
            --radius: 0px;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 12px;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--fg);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 0 2rem;
            height: 42px;
            border-bottom: 0.8px solid var(--border);
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
        }

        .nav-brand {
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .nav-links {
            display: flex;
            align-items: stretch;
            height: 100%;
        }

        .nav-links a {
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--fg-muted);
            text-decoration: none;
            border-left: 0.8px solid var(--border);
            transition: color 0.15s;
            position: relative;
        }

        .nav-links a.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 1.6px;
            background: var(--accent);
        }

        .nav-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        .main {
            display: grid;
            grid-template-columns: 368px 1fr;
            height: calc(100vh - 42px);
            overflow: hidden;
        }

        .panel-left {
            border-right: 0.8px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 2.5rem 2rem;
        }

        .panel-left h1 {
            font-size: 1.7rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .rules-table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 0.7rem 1rem;
            height: 32px;
            font-size: 0.68rem;
            text-transform: uppercase;
            color: var(--fg-subtle);
            background: #fff;
            border-bottom: 0.8px solid var(--border);
        }

        td {
            padding: 0.75rem 1rem;
            font-size: 0.82rem;
            border-bottom: 0.8px solid var(--border);
        }

        .rule-id {
            font-family: monospace;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <nav>
        <div class="nav-brand">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ff570a" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            MODINTEL
        </div>
        <div class="nav-links">
            <a href="index.html">Events</a>
            <a href="rules.html" class="active">Rules</a>
            <a href="config.html">Config</a>
        </div>
        <div class="nav-actions"></div>
    </nav>
    <div class="main">
        <div class="panel-left">
            <h1>Rule Intelligence</h1>
            <p>Active security signatures currently enforced by the ModIntel engine.</p>
        </div>
        <div class="panel-right" style="overflow-y: auto;">
            <div
                style="display: flex; align-items: center; padding:0 2rem; height: 32px; border-bottom: 0.8px solid var(--border); background: #fff; font-size: 0.75rem; text-transform: uppercase; color: var(--fg-subtle); font-weight: 600; letter-spacing: 0.05em;">
                Security Signatures</div>
            <table class="rules-table">
                <thead>
                    <tr>
                        <th style="width: 20%;">Rule ID</th>
                        <th>Classification</th>
                        <th style="width: 20%;">Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="rule-id">911xxx</td>
                        <td>Method Enforcement</td>
                        <td style="color:var(--success);">Active</td>
                    </tr>
                    <tr>
                        <td class="rule-id">941xxx</td>
                        <td>XSS Detection</td>
                        <td style="color:var(--success);">Active</td>
                    </tr>
                    <tr>
                        <td class="rule-id">942100</td>
                        <td>SQL Injection</td>
                        <td style="color:var(--success);">Active</td>
                    </tr>
                    <tr>
                        <td class="rule-id">949110</td>
                        <td>Anomaly Blocking</td>
                        <td style="color:var(--success);">Active</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
