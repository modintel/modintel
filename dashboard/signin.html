<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ModIntel - Sign In</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="description" content="ModIntel Hybrid WAF - Rules detect, ML judges, Humans verify">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/signin.css">
</head>
<body class="signin-page">
    <div class="signin-container">
        <!-- Left Side - Orange Brand Section -->
        <div class="brand-section-orange">
            <div class="brand-logo-top">
                <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </div>

            <div class="brand-content">
                <div class="brand-headline">
                    RULES DETECT.<br>
                    ML JUDGES.<br>
                    HUMANS VERIFY.
                </div>

                <ul class="features-list">
                    <li class="feature-item">
                        <div class="feature-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                            </svg>
                        </div>
                        <span class="feature-text">Coraza WAF with OWASP CRS</span>
                    </li>
                    <li class="feature-item">
                        <div class="feature-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </div>
                        <span class="feature-text">ML-Powered Decision Engine</span>
                    </li>
                    <li class="feature-item">
                        <div class="feature-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                                <circle cx="9" cy="7" r="4"></circle>
                                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                            </svg>
                        </div>
                        <span class="feature-text">Human Review Dashboard</span>
                    </li>
                </ul>
            </div>

<div class="brand-footer-orange">
                v3.0.0 • Caddy + Coraza + ML Inference
            </div>
        </div>

        <!-- Right Side - Sign In Form -->
        <div class="form-section">
            <div class="form-wrapper">
                <div class="form-header">
                    <h2 class="form-title">Welcome back</h2>
                    <p class="form-subtitle">Sign in to access the ModIntel dashboard</p>
                </div>

                <div id="alert" class="signin-alert"></div>

                <form id="signin-form">
                    <div class="signin-form-group">
                        <label class="signin-form-label" for="email">Email Address</label>
                        <input 
                            type="email" 
                            id="email" 
                            class="signin-form-input" 
                            placeholder="analyst@modintel.io"
                            required
                            autocomplete="email"
                        >
                    </div>

                    <div class="signin-form-group">
                        <label class="signin-form-label" for="password">Password</label>
                        <input 
                            type="password" 
                            id="password" 
                            class="signin-form-input" 
                            placeholder="Enter your password"
                            required
                            autocomplete="current-password"
                        >
                    </div>

                    <div class="form-options">
                        <label class="checkbox-wrapper">
                            <input type="checkbox" id="remember" name="remember">
                            <span class="checkbox-label">Remember me</span>
                        </label>
                        <a href="#" class="forgot-link" onclick="showComingSoon(event)">Forgot password?</a>
                    </div>

                    <button type="submit" class="signin-btn signin-btn-primary" id="signin-btn">
                        Sign In
                    </button>
                </form>

                <div class="form-footer">
                    Don't have an account? <a href="#" onclick="showComingSoon(event)">Request access</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/signin.js"></script>
</body>
</html>
