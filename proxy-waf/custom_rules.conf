SecRule ARGS "@rx (?i)http[s]?://|ftp://|file://|gopher://" "id:990050,phase:2,pass,log,msg:'Custom SSRF Protection: URL scheme detected',tag:'custom',tag:'SSRF',setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}'"
