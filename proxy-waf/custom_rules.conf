SecRule ARGS_NAMES|ARGS|REQUEST_BODY "@rx \$(?:gt|lt|ne|eq|in|nin|where)" "id:990008,phase:2,pass,log,msg:'Custom NoSQLi Protection: MongoDB operator detected',tag:'custom',tag:'NoSQLi',setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}'"
SecRule REQUEST_URI "@rx (?i)(?:%20|\s|\+)+(?:or|and)(?:%20|\s|\+)+'.*==" "id:990009,phase:1,pass,log,msg:'Custom NoSQLi Protection: URI based NoSQLi detected',tag:'custom',tag:'NoSQLi',setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}'"
SecRule REQUEST_URI|ARGS_NAMES|ARGS "@rx \$where" "id:990010,phase:1,pass,log,msg:'Custom NoSQLi Protection: $where operator detected',tag:'custom',tag:'NoSQLi',setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}'"
SecRule ARGS|REQUEST_URI "@rx \{\{" "id:990011,phase:2,pass,log,msg:'Custom SSTI Protection: Handlebars Template markers detected',tag:'custom',tag:'SSTI',setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}'"
SecRule ARGS|REQUEST_URI "@rx \$\{" "id:990012,phase:2,pass,log,msg:'Custom SSTI Protection: EL/JEXL Template markers detected',tag:'custom',tag:'SSTI',setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}'"

SecRule ARGS "@rx (?i)(?:union|select|insert|update|delete|drop|create|alter|truncate|exec|execute|xp_)" "id:990020,phase:2,pass,log,msg:'Custom SQLi Protection: SQL keyword detected',tag:'custom',tag:'SQLi',setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}'"
SecRule REQUEST_URI "@rx (?i)(?:union|select|insert|update|delete|drop|create|alter|truncate)" "id:990021,phase:1,pass,log,msg:'Custom SQLi Protection: SQL keyword in URI detected',tag:'custom',tag:'SQLi',setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}'"
SecRule ARGS "@rx (?i)(?:union\s+select|select\s+from|insert\s+into|delete\s+from|drop\s+table)" "id:990022,phase:2,pass,log,msg:'Custom SQLi Protection: SQL phrase detected',tag:'custom',tag:'SQLi',setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}'"
SecRule ARGS "@rx (?i)(?:or\s+1\s*=\s*1|and\s+1\s*=\s*1|'?\s*=\s*'?|1\s*=\s*1)" "id:990023,phase:2,pass,log,msg:'Custom SQLi Protection: OR/AND 1=1 detected',tag:'custom',tag:'SQLi',setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}'"
SecRule ARGS "@rx (?i)(?:sleep\s*\(|benchmark\s*\(|waitfor\s+delay)" "id:990024,phase:2,pass,log,msg:'Custom SQLi Protection: Time-based SQL injection detected',tag:'custom',tag:'SQLi',setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}'"

SecRule ARGS "@rx (?i)<script|<\/script|<iframe|<object|<embed|<applet" "id:990030,phase:2,pass,log,msg:'Custom XSS Protection: HTML tag detected',tag:'custom',tag:'XSS',setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}'"
SecRule ARGS "@rx (?i)on\w+\s*=" "id:990031,phase:2,pass,log,msg:'Custom XSS Protection: Event handler detected',tag:'custom',tag:'XSS',setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}'"
SecRule ARGS "@rx (?i)javascript:" "id:990032,phase:2,pass,log,msg:'Custom XSS Protection: javascript: URI detected',tag:'custom',tag:'XSS',setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}'"
SecRule ARGS "@rx (?i)alert\s*\(|prompt\s*\(|confirm\s*\(" "id:990033,phase:2,pass,log,msg:'Custom XSS Protection: JS function detected',tag:'custom',tag:'XSS',setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}'"

SecRule ARGS "@rx (?i)\|\s*whoami|\|\s*cat|\|\s*ls|\|\s*dir|\|\s*rm|\|\s*cp" "id:990040,phase:2,pass,log,msg:'Custom CMDi Protection: Pipe command detected',tag:'custom',tag:'CMDi',setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}'"
SecRule ARGS "@rx (?i)(?:;\s*rm\s+|\$\(|`)" "id:990041,phase:2,pass,log,msg:'Custom CMDi Protection: Command injection chars detected',tag:'custom',tag:'CMDi',setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}'"
