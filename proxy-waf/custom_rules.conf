SecRule REQUEST_URI "@rx windows[\\/]system32" "id:990003,phase:1,pass,log,msg:'Custom LFI Protection: Windows System32 access denied',tag:'custom',tag:'LFI',setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}'"
SecRule ARGS "@rx \x60" "id:990004,phase:2,pass,log,msg:'Custom CMDi Protection: Backtick operator detected',tag:'custom',tag:'CMDi',setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}'"
