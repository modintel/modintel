SecRule REQUEST_URI "@contains /etc/passwd" "id:990001,phase:1,pass,log,msg:'Custom LFI Protection: etc/passwd access denied',tag:'custom',tag:'LFI',setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}'"
