services:
  mongodb:
    image: mongo:7
    volumes:
      - modintel_mongo_data:/data/db
    networks:
      - modintel-net
    ports:
      - "127.0.0.1:27018:27017"
    restart: always

  proxy-waf-custom:
    build: ./services/proxy-waf-custom
    volumes:
      - ./services/proxy-waf-custom/Caddyfile:/etc/caddy/Caddyfile
      - modintel_caddy_logs:/var/log/caddy
    networks:
      - modintel-net
    ports:
      - "8080:8080"
      - "3000:3000"
    restart: always
    command: ["caddy", "run", "--config", "/etc/caddy/Caddyfile", "--adapter", "caddyfile"]

  proxy-waf:
    image: ghcr.io/coreruleset/coraza-crs:caddy-alpine
    volumes:
      - ./proxy-waf/Caddyfile:/config/caddy/Caddyfile
      - ./proxy-waf/coraza.conf:/opt/coraza/config.d/user.conf
      - ./proxy-waf/custom_rules.conf:/opt/coraza/config.d/custom.conf
      - ./proxy-waf/overrides:/opt/coraza/overrides
      - ./dashboard:/srv/dashboard:ro
      - modintel_waf-logs:/var/log/coraza
    environment:
      - BACKEND=juice-shop:3000
      - CORAZA_AUDIT_LOG=/var/log/coraza/audit.json
      - PARANOIA=4
      - BLOCKING_PARANOIA=4
      - ANOMALY_INBOUND=3
    networks:
      - modintel-net
    restart: always
    user: root

  juice-shop:
    image: bkimminich/juice-shop:latest
    networks:
      - modintel-net
    restart: always

  log-collector:
    build: ./services/log-collector
    volumes:
      - modintel_caddy_logs:/var/log/caddy:ro
      - modintel_waf-logs:/var/log/coraza:ro
      - ./services/log-collector/signatures:/app/signatures:ro
    environment:
      - CADDY_LOG_PATH=/var/log/caddy/waf-access.json
      - CORAZA_LOG_PATH=/var/log/coraza/audit.json
      - MONGO_URI=${MONGO_URI}
      - INFERENCE_ENGINE_URL=${INFERENCE_ENGINE_URL}
      - MODINTEL_SIGNATURES_FILE=/app/signatures/modintel_regex.signatures
    networks:
      - modintel-net
    ports:
      - "8081:8081"
    restart: always

  inference-engine:
    build: ./services/inference-engine
    ports:
      - "8083:8083"
    volumes:
      - ./models:/app/models:ro
      - ./services/inference-engine:/app
    environment:
      - MODEL_VERSION=v3
      - MISS_ONNX_MODEL_PATH=/app/models/modintel.onnx
    mem_limit: 512m
    restart: always
    networks:
      - modintel-net

  review-api:
    build: ./services/review-api
    ports:
      - "8082:8082"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./proxy-waf/overrides:/waf-overrides
    environment:
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME}
      - WAF_ENGINE=Coraza (Caddy edge)
      - BACKEND_TARGET=${BACKEND_TARGET}
      - INFERENCE_ENGINE_URL=${INFERENCE_ENGINE_URL}
      - WAF_OVERRIDES_FILE=/waf-overrides/managed-
        overrides.conf
    networks:
      - modintel-net
    restart: always
    user: root

  health-aggregator:
    build: ./services/health-aggregator
    ports:
      - "8090:8090"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - HEALTH_AGG_ADDR=:8090
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME}
    networks:
      - modintel-net
    restart: always
    user: root

  auth-service:
    build: ./services/auth-service
    ports:
      - "8084:8084"
    environment:
      - AUTH_PORT=${AUTH_PORT}
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB_NAME=${MONGO_DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_EXPIRY=${JWT_ACCESS_EXPIRY}
      - JWT_REFRESH_EXPIRY=${JWT_REFRESH_EXPIRY}
      - BCRYPT_COST=${BCRYPT_COST}
      - RATE_LIMIT_AUTH=${RATE_LIMIT_AUTH}
      - AUTH_BOOTSTRAP_ADMIN_EMAIL=${AUTH_BOOTSTRAP_ADMIN_EMAIL}
      - AUTH_BOOTSTRAP_ADMIN_PASSWORD=${AUTH_BOOTSTRAP_ADMIN_PASSWORD}
      - AUTH_BOOTSTRAP_ADMIN_ROLE=${AUTH_BOOTSTRAP_ADMIN_ROLE}
      - AUTH_BOOTSTRAP_ADMIN_NAME=${AUTH_BOOTSTRAP_ADMIN_NAME}
    networks:
      - modintel-net
    restart: always

networks:
  modintel-net:
    name: modintel_net

volumes:
  modintel_waf-logs:
    name: modintel_waf-logs
  modintel_mongo_data:
    name: modintel_mongo_data
  modintel_caddy_logs:
    name: modintel_caddy_logs
