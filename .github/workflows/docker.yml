name: docker-build-publish

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: set up docker buildx
        uses: docker/setup-buildx-action@c47758b77c9736f44a4cd33ddf49555bf61c92a6

      - name: log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@9780bd3d9e865d4476a7170815eb0f34ebe520d6
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build and push log collector
        uses: docker/build-push-action@471d1dc4e07e763b0a7993c6028c3f4e63f901b0
        with:
          context: ./services/log-collector
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/log-collector:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: build and push inference engine
        uses: docker/build-push-action@471d1dc4e07e763b0a7993c6028c3f4e63f901b0
        with:
          context: ./services/inference-engine
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/inference-engine:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: build and push review api
        uses: docker/build-push-action@471d1dc4e07e763b0a7993c6028c3f4e63f901b0
        with:
          context: ./services/review-api
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/review-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
