name: e2e

on:
  push:
    branches: [modintel-base]
  pull_request:
    branches: [modintel-base]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  docker-compose-test:
    name: docker-compose-integration-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create .env file
        run: |
          cat > .env << EOF
          MONGO_URI=mongodb://mongodb:27017
          JWT_SECRET=test-secret-for-ci
          INFERENCE_ENGINE_URL=http://inference-engine:8083
          AUTH_PORT=8084
          BACKEND_TARGET=juice-shop:3000
          AUTH_BOOTSTRAP_ADMIN_EMAIL=admin@modintel.local
          AUTH_BOOTSTRAP_ADMIN_PASSWORD=ChangeMe123!
          AUTH_BOOTSTRAP_ADMIN_ROLE=admin
          AUTH_BOOTSTRAP_ADMIN_NAME=Admin
          JWT_ACCESS_EXPIRY=15m
          JWT_REFRESH_EXPIRY=24h
          BCRYPT_COST=10
          RATE_LIMIT_AUTH=100
          MONGO_DB_NAME=modintel
          EOF

      - name: Build services
        run: |
          docker compose build --parallel

      - name: Start services
        run: |
          docker compose up -d
          sleep 20

      - name: Health check services
        run: |
          docker compose ps

      - name: Test log-collector
        run: |
          docker compose exec -T log-collector \
            /bin/sh -c "echo 'log-collector running'"

      - name: Test review-api
        run: |
          curl -f http://localhost:8080/health || \
            curl -f http://localhost:3000/health || true

      - name: Test inference-engine
        run: |
          curl -f http://localhost:8000/health || \
            curl -f http://localhost:8000/ || true

      - name: Run integration tests
        run: |
          docker compose -f docker-compose.yml \
            up --abort-on-container-exit test || true

      - name: Stop services
        if: always()
        run: |
          docker compose down --remove-orphans
