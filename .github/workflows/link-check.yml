name: link-check

on:
  push:
    branches: [modintel-base]
  pull_request:
    branches: [modintel-base]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  markdown-links:
    name: markdown-link-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install markdown-link-check
        run: npm install -g markdown-link-check

      - name: Check README links
        run: |
          markdown-link-check \
            --config .github/workflows/linkcheck-config.json \
            README.md || true

      - name: Check docs links
        run: |
          markdown-link-check \
            --config .github/workflows/linkcheck-config.json \
            docs/ || true

      - name: Check landing site links
        run: |
          for file in landing-site/**/*.md; do
            markdown-link-check \
              --config .github/workflows/linkcheck-config.json \
              "$file" || true
          done
