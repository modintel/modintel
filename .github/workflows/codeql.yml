name: security-analysis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  analyze:
    name: analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [ go, python, javascript-typescript ]

    steps:
      - name: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      
      - name: init
        uses: github/codeql-action/init@45580470d061c28c89f28d844c8d50b402868c2d
        with:
          languages: ${{ matrix.language }}
          build-mode: autobuild

      - name: analyze
        uses: github/codeql-action/analyze@45580470d061c28c89f28d844c8d50b402868c2d
        with:
          category: "/language:${{matrix.language}}"
