name: security-analysis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  analyze:
    name: analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [ go, python, javascript-typescript ]

    steps:
      - name: checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      
      - name: init
        uses: github/codeql-action/init@820e3160e279568db735cee8ed8f8e77a6da7818
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.language == 'go' && 'autobuild' || 'none' }}

      - name: analyze
        uses: github/codeql-action/analyze@820e3160e279568db735cee8ed8f8e77a6da7818
        with:
          category: "/language:${{matrix.language}}"
